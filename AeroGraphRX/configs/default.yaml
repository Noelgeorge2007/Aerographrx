# AeroGraphRX Configuration
# Paper: "AeroGraphRX: Simulation of a GSP Framework..."
# Complete hyperparameter specification for reproducibility

simulation:
  n_mc_trials: 10000
  n_signal_events: 500
  snr_range_db: [-10, 20]
  snr_step_db: 1
  random_seed_base: 42

receivers:
  n_receivers: 4
  baseline_range_km: [5, 50]
  gps_sync_ns: 50
  positions:  # Example 4-receiver layout (km)
    - [0.0, 0.0, 0.0]
    - [25.0, 0.0, 0.0]
    - [12.5, 21.65, 0.0]
    - [12.5, 7.22, 0.0]

graph:
  alpha_s: 0.4
  alpha_f: 0.4
  alpha_t: 0.2
  sigma_s: 10.0  # km
  sigma_f: 1.0
  tau: 5.0  # seconds
  epsilon: 0.5  # sparsity threshold
  chebyshev_K: 5
  spectral_cutoff_K0: 50

cnn_gcn:
  cnn_filters: [32, 64, 128]
  gcn_hidden_dim: 128
  gcn_layers: 2
  lambda_reg: 0.001
  mu_smooth: 0.01
  learning_rate: 0.001
  epochs: 100
  batch_size: 64

vae:
  latent_dim: 32
  hidden_dims: [256, 128]
  beta: 0.1
  learning_rate: 0.001
  epochs: 100
  batch_size: 64

jpda:
  gate_threshold: 16.0
  dt: 1.0  # seconds
  process_noise_std: 0.1
  measurement_noise_std: 0.05

stealth:
  K0: 50
  gamma: 1.0
  pfa: 0.05

stft:
  n_fft: 2048
  hop_length: 1024
  window: hann
  fs: 2.4e6

dataset:
  modulation_types: [AM, FM, BPSK, QPSK, 8PSK, 16QAM, 64QAM, OFDM, GFSK, GMSK]
  samples_per_class: 1000
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

evaluation:
  n_bootstrap: 1000
  confidence_level: 0.95
  bonferroni_pairs: 6
  alpha: 0.05

hardware:
  device: cpu  # or cuda
  n_workers: 4
